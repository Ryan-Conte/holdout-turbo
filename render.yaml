# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

envVarGroups:
  - name: holdout-api-runtime
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: RUNTIME_CACHE_DIR
        value: /tmp/holdout-runtime-cache
      - key: MAX_PLAYERS_PER_SERVER
        value: 200

services:
  - type: web
    runtime: node
    name: holdout-api-oregon
    region: oregon
    plan: starter
    numInstances: 1
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build -w @holdout/shared && npm run build -w @holdout/api
    startCommand: npm run start -w @holdout/api
    healthCheckPath: /health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    buildFilter:
      paths: [apps/api/**, packages/shared/**, prisma/**, package.json, package-lock.json, turbo.json, render.yaml]
    envVars:
      - fromGroup: holdout-api-runtime
      # Render prompts for shared values on this primary service only.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SERVER_NAME
        value: HOLDOUT US West
      - key: SERVER_REGION
        value: us-west
      - key: SERVER_SORT
        value: 10

  - type: web
    runtime: node
    name: holdout-api-frankfurt
    region: frankfurt
    plan: starter
    numInstances: 1
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build -w @holdout/shared && npm run build -w @holdout/api
    startCommand: npm run start -w @holdout/api
    healthCheckPath: /health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    buildFilter:
      paths: [apps/api/**, packages/shared/**, prisma/**, package.json, package-lock.json, turbo.json, render.yaml]
    envVars:
      - fromGroup: holdout-api-runtime
      - key: DATABASE_URL
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: DATABASE_URL
      - key: JWT_SECRET
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: JWT_SECRET
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: CORS_ORIGIN
      - key: SERVER_NAME
        value: HOLDOUT Europe
      - key: SERVER_REGION
        value: eu-central
      - key: SERVER_SORT
        value: 20

  - type: web
    runtime: node
    name: holdout-api-singapore
    region: singapore
    plan: starter
    numInstances: 1
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build -w @holdout/shared && npm run build -w @holdout/api
    startCommand: npm run start -w @holdout/api
    healthCheckPath: /health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    buildFilter:
      paths: [apps/api/**, packages/shared/**, prisma/**, package.json, package-lock.json, turbo.json, render.yaml]
    envVars:
      - fromGroup: holdout-api-runtime
      - key: DATABASE_URL
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: DATABASE_URL
      - key: JWT_SECRET
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: JWT_SECRET
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: holdout-api-oregon
          envVarKey: CORS_ORIGIN
      - key: SERVER_NAME
        value: HOLDOUT Asia Pacific
      - key: SERVER_REGION
        value: ap-southeast
      - key: SERVER_SORT
        value: 30
